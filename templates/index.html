<!DOCTYPE html>
<html>
<head>
    <title>Threat Detection Dashboard</title>
    <script src="https://cdn.socket.io/4.0.0/socket.io.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body style="background:#0f172a; color:white; font-family:sans-serif; padding:20px;">

<h1>🚨 Real-Time Threat Detection Dashboard</h1>

<div style="display:flex; gap:20px;">
    <div style="background:#1e293b; padding:20px; border-radius:10px;">
        <h3>Total Failed Logins</h3>
        <h1 id="count">0</h1>
    </div>

    <div style="background:#1e293b; padding:20px; border-radius:10px;">
        <h3>Last Attacker IP</h3>
        <h2 id="ip">-</h2>
    </div>
</div>

<br>

<canvas id="chart" width="700" height="300"></canvas>

<h3>Recent Activity</h3>
<table border="1" style="width:100%; text-align:left;">
    <thead>
        <tr>
            <th>Time</th>
            <th>IP</th>
        </tr>
    </thead>
    <tbody id="logTable"></tbody>
</table>

<script>
    var socket = io();

    const ctx = document.getElementById('chart').getContext('2d');

    const chart = new Chart(ctx, {
        type: 'line',
        data: {
            labels: [],
            datasets: [{
                label: 'Failed Logins',
                data: [],
                borderWidth: 2
            }]
        }
    });

    socket.on('new_event', function(data) {

        document.getElementById('count').innerText = data.count;
        document.getElementById('ip').innerText = data.ip;

        const time = new Date().toLocaleTimeString();

        // Update graph
        chart.data.labels.push(time);
        chart.data.datasets[0].data.push(data.count);
        chart.update();

        // Add to table
        let row = `<tr><td>${time}</td><td>${data.ip}</td></tr>`;
        document.getElementById('logTable').innerHTML =
            row + document.getElementById('logTable').innerHTML;

        // Visual alert flash
        document.body.style.background = "#3f0000";
        setTimeout(() => document.body.style.background = "#0f172a", 200);
    });
</script>

</body>
</html>
